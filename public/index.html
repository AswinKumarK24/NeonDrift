<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Task Management</title>
    <meta name="description" content="Aura is a beautiful, minimalist task management system.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Aura</h1>
            <p>Elevate your productivity</p>
        </header>

        <main>
            <section class="task-input-section">
                <form id="task-form">
                    <div class="input-group">
                        <input type="text" id="task-title" placeholder="What needs to be done?" required autocomplete="off">
                        <input type="text" id="task-desc" placeholder="Details (optional)" autocomplete="off">
                    </div>
                    <button type="submit" class="btn-primary">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Add Task
                    </button>
                </form>
            </section>

            <section class="task-list-section">
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="pending">Pending</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
                
                <div class="tasks-container" id="tasks-container">
                    <!-- Tasks will be injected here via JS -->
                    <div class="loading">Loading your aura...</div>
                </div>
            </section>
        </main>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
